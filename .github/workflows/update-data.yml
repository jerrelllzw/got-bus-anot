name: Update bus data

# Refresh the static per-service data shards from LTA DataMall.
# Schedules rarely change, so weekly is plenty; workflow_dispatch lets you
# trigger a manual run (e.g. the first time, to generate real data).
on:
  schedule:
    # 09:00 UTC every Monday = 17:00 Singapore time.
    - cron: "0 9 * * 1"
  workflow_dispatch:

# Allow the job to push the refreshed data back to the repo.
permissions:
  contents: write

# Never run two refreshes at once.
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch data from LTA DataMall
        env:
          # Add this in: Settings -> Secrets and variables -> Actions.
          LTA_ACCOUNT_KEY: ${{ secrets.LTA_ACCOUNT_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage shards, the index, and any removed services. holidays.json is
          # maintained by hand and untouched by the fetch script.
          git add -A data/svc data/services.json
          # Only commit if the data actually changed.
          if git diff --staged --quiet; then
            echo "No changes to bus data — nothing to commit."
          else
            git commit -m "chore: refresh bus data $(date -u +%Y-%m-%d)"
            git push
          fi
